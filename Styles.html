<style>
:root{--maroon:#7A263A;--snow:#F7F5F0;--charcoal:#2F2F2F;--white:#fff}*{box-sizing:border-box}body{margin:0;background:var(--snow);font-family:Arial,Helvetica,sans-serif;color:var(--charcoal)}header{background:var(--maroon);color:white;padding:20px;display:flex;gap:16px;justify-content:space-between;align-items:center;flex-wrap:wrap}.brand{display:flex;gap:14px;align-items:center}.badge{width:52px;height:52px;border-radius:50%;background:white;color:var(--maroon);display:grid;place-items:center;font-weight:800}h1{font-size:22px;margin:0}header p{margin:3px 0 0}nav{display:flex;gap:8px;flex-wrap:wrap}button{border:0;border-radius:12px;padding:11px 15px;font-weight:700;cursor:pointer;background:white;color:var(--maroon)}button.primary{background:var(--maroon);color:white;margin-top:12px}main{max-width:960px;margin:24px auto;padding:0 16px}.card{background:white;border-radius:20px;padding:24px;box-shadow:0 10px 28px rgba(0,0,0,.08)}.page{display:none}.page.active{display:block}.grid{display:grid;gap:14px}.grid.two{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}label{display:block;margin:12px 0;font-weight:700}input,select{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-top:6px}.waiver{max-height:220px;overflow:auto;white-space:pre-wrap;background:#fbfbfb;border:1px solid #e6e6e6;border-radius:12px;padding:14px;font-size:13px;line-height:1.4}.check{font-weight:400}.result{margin-top:18px;padding:16px;border-radius:14px;background:#f5f5f5}.big{font-size:34px;font-weight:800;color:var(--maroon)}.qr{width:180px;max-width:100%;border-radius:12px;background:white}.error{background:#ffe8e8;color:#7a0000}.success{background:#edf8ef;color:#145724}table{width:100%;border-collapse:collapse;margin-top:12px}td,th{padding:8px;border-bottom:1px solid #eee;text-align:left}
