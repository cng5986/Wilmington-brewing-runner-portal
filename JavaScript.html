<script>
let APP={};
function init(){google.script.run.withSuccessHandler(data=>{APP=data;document.getElementById('waiverText').textContent=data.settings['Waiver Text']||'';const p=new URLSearchParams(location.search); if(p.get('page')) showPage(p.get('page')); if(p.get('runner')) document.getElementById('checkRunnerId').value=p.get('runner');}).getAppData();}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));(document.getElementById(id)||document.getElementById('home')).classList.add('active');}
document.getElementById('registerForm').addEventListener('submit',e=>{e.preventDefault();const fd=new FormData(e.target);const obj=Object.fromEntries(fd.entries());obj.waiverAccepted=fd.has('waiverAccepted');setHtml('registerResult','Working...');google.script.run.withSuccessHandler(m=>{setHtml('registerResult',memberCard(m,'Registration complete!'),'success');e.target.reset();}).withFailureHandler(err=>setHtml('registerResult',err.message,'error')).registerMember(obj);});
function lookup(){const q=document.getElementById('memberLookup').value;setHtml('memberResult','Working...');google.script.run.withSuccessHandler(m=>setHtml('memberResult',memberCard(m),'success')).withFailureHandler(err=>setHtml('memberResult',err.message,'error')).lookupMember(q);}
function checkIn(){const id=document.getElementById('checkRunnerId').value;const notes=document.getElementById('checkNotes').value;setHtml('checkResult','Working...');google.script.run.withSuccessHandler(m=>setHtml('checkResult',memberCard(m,'Checked in! +1 Fist Bump'),'success')).withFailureHandler(err=>setHtml('checkResult',err.message,'error')).checkInMember(id,notes);}
function createEvent(){google.script.run.withSuccessHandler(e=>{setHtml('adminResult','Active event: '+e.name,'success');loadStats();}).withFailureHandler(err=>setHtml('adminResult',err.message,'error')).adminCreateEvent(document.getElementById('eventName').value,document.getElementById('eventLocation').value,document.getElementById('eventNotes').value);}
function loadStats(){google.script.run.withSuccessHandler(s=>{let html='<div class="result"><b>Total Members:</b> '+s.totalMembers+'<br><b>Total Check-Ins:</b> '+s.totalCheckIns+'<br><b>Active Event:</b> '+(s.activeEvent?s.activeEvent.name:'None')+'<h3>Leaderboard</h3><table><tr><th>Runner</th><th>Fist Bumps</th></tr>';s.leaderboard.forEach(r=>html+='<tr><td>'+esc(r['First Name'])+' '+esc(r['Last Name'])+'</td><td>'+esc(r['Fist Bumps'])+'</td></tr>');html+='</table></div>';document.getElementById('adminResult').innerHTML=html;}).getAdminStats();}
function memberCard(m,title){return '<div class="result"><h3>'+(title||'Member Found')+'</h3><div class="big">👊 '+m.fistBumps+'</div><p><b>'+esc(m.firstName)+' '+esc(m.lastName)+'</b><br>'+esc(m.runnerId)+'</p>'+(m.qrUrl?'<img class="qr" src="'+esc(m.qrUrl)+'">':'')+'<p><b>Next Reward:</b> '+(m.nextReward?esc(m.nextReward.name)+' at '+m.nextReward.needed+' Fist Bumps ('+m.nextReward.remaining+' to go)':'All current rewards reached')+'</p></div>';}
function setHtml(id,html,kind){document.getElementById(id).innerHTML='<div class="result '+(kind||'')+'">'+html+'</div>'}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
init();
</script>
