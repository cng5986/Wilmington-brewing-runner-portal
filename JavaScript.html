<script>
function showRegister() {
  document.getElementById('register').classList.remove('hidden');
  document.getElementById('register').scrollIntoView({ behavior: 'smooth' });
}

function showMemberDashboard() {
  document.getElementById('memberDashboard').classList.remove('hidden');
  document.getElementById('memberDashboard').scrollIntoView({ behavior: 'smooth' });
}

function showComingSoon(name) {
  alert(name + ' is coming next.');
}

function submitRegistration() {
  const data = {
    firstName: document.getElementById('firstName').value.trim(),
    lastName: document.getElementById('lastName').value.trim(),
    email: document.getElementById('email').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    shirtSize: document.getElementById('shirtSize').value,
    emergencyName: document.getElementById('emergencyName').value.trim(),
    emergencyPhone: document.getElementById('emergencyPhone').value.trim(),
    waiverAccepted: document.getElementById('waiverAccepted').checked
  };

  const msg = document.getElementById('registrationMessage');

  if (!data.firstName || !data.lastName || !data.email || !data.waiverAccepted) {
    msg.textContent = 'Please complete first name, last name, email, and accept the waiver.';
    return;
  }

  msg.textContent = 'Registering...';

  google.script.run
    .withSuccessHandler(function(result) {
      msg.innerHTML =
        '<div class="member-card">' +
          '<h3>Welcome to the Run Club</h3>' +
          '<p class="runner-id">' + result.runnerId + '</p>' +
          '<p>Save this QR code and bring it to every run.</p>' +
          '<img class="qr" src="' + result.qrCodeUrl + '">' +
          '<p><strong>👊 0 Fist Bumps</strong></p>' +
          '<p>Next reward: TBD</p>' +
        '</div>';
    })
    .withFailureHandler(function(error) {
      msg.textContent = error.message;
    })
    .registerMember(data);
}

function lookupMember() {
  const lookup = document.getElementById('memberLookup').value.trim();
  const resultBox = document.getElementById('memberDashboardResult');

  if (!lookup) {
    resultBox.innerHTML = '<p>Please enter your Runner ID or email.</p>';
    return;
  }

  resultBox.innerHTML = '<p>Looking up member...</p>';

  google.script.run
    .withSuccessHandler(function(member) {
     const nextReward = 5;
const progress = Math.min((member.fistBumps / nextReward) * 100, 100);

resultBox.innerHTML =
  '<div class="member-card">' +
    '<h3>' + member.firstName + ' ' + member.lastName + '</h3>' +
    '<p class="runner-id">' + member.runnerId + '</p>' +
    '<img class="qr" src="' + member.qrCodeUrl + '">' +
    '<p><strong>👊 ' + member.fistBumps + ' Fist Bumps</strong></p>' +
    '<div class="progress"><div style="width:' + progress + '%"></div></div>' +
    '<p>' + member.fistBumps + ' / 5 to next reward</p>' +
    '<p><strong>Next run:</strong><br>Tuesday • 6:30 PM<br>Wilmington Brewing Company</p>' +
  '</div>';
    })
    .withFailureHandler(function(error) {
      resultBox.innerHTML = '<p>' + error.message + '</p>';
    })
    .getMemberByLookup(lookup);
}
function showVolunteerCheckIn() {
  document.getElementById('volunteerCheckIn').classList.remove('hidden');
  document.getElementById('volunteerCheckIn').scrollIntoView({ behavior: 'smooth' });
}

function confirmCheckIn() {
  const runnerId = document.getElementById('checkInRunnerId').value.trim();
  const notes = document.getElementById('checkInNotes').value.trim();
  const resultBox = document.getElementById('checkInResult');

  if (!runnerId) {
    resultBox.innerHTML = '<p>Please enter a Runner ID.</p>';
    return;
  }

  resultBox.innerHTML = '<p>Checking in runner...</p>';

  google.script.run
    .withSuccessHandler(function(result) {
      resultBox.innerHTML =
        '<div class="member-card">' +
          '<h3>✅ Check-In Successful</h3>' +
          '<p><strong>' + result.firstName + ' ' + result.lastName + '</strong></p>' +
          '<p class="runner-id">' + result.runnerId + '</p>' +
          '<p>👊 Fist Bumps</p>' +
          '<p><strong>' + result.oldTotal + ' → ' + result.newTotal + '</strong></p>' +
          '<p>See you next Tuesday!</p>' +
        '</div>';

      document.getElementById('checkInRunnerId').value = '';
      document.getElementById('checkInNotes').value = '';
    })
    .withFailureHandler(function(error) {
      resultBox.innerHTML = '<p>' + error.message + '</p>';
    })
    .checkInMember(runnerId, notes);
}
</script>
